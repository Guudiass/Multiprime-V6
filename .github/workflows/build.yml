name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Cria o GitHub Release ANTES de qualquer build, como published (nao draft)
  # Assim os jobs de build apenas fazem upload de assets — sem race de criacao
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or reuse release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Release $TAG ja existe — reuse"
          else
            gh release create "$TAG" \
              --repo ${{ github.repository }} \
              --title "$TAG" \
              --notes "Auto-build $TAG" \
              --target ${{ github.sha }}
            echo "Release $TAG criado (published)"
          fi

  build-win-linux:
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2-dev rpm dpkg fakeroot imagemagick

      - name: Convert icon for Linux
        if: matrix.platform == 'linux'
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            convert icon.ico[0] -resize 1024x1024 icon.png || true
          fi

      - name: Install dependencies
        run: npm install

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

  build-mac:
    needs: [create-release, build-win-linux]
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Convert icon
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            sips -s format png icon.ico --out icon.png --resampleWidth 1024 2>/dev/null || true
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Mac (signed)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --mac --publish always

      - name: Notarize DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "=== DMGs encontrados ==="
          ls -la dist/*.dmg 2>/dev/null || true

          for DMG in dist/*.dmg; do
            if [ -f "$DMG" ]; then
              echo ""
              echo "=== Notarizando: $DMG ==="
              xcrun notarytool submit "$DMG" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait --timeout 30m 2>&1

              if [ $? -eq 0 ]; then
                echo "✅ Notarizado! Stapling..."
                xcrun stapler staple "$DMG"
                echo "✅ Stapled: $DMG"
              else
                echo "⚠️ Notarização falhou para $DMG (continuando...)"
              fi
            fi
          done

      - name: Re-upload notarized DMGs to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "=== Re-uploading DMGs notarizados para release $TAG ==="

          for DMG in dist/*.dmg; do
            if [ -f "$DMG" ]; then
              FILENAME=$(basename "$DMG")
              echo "Uploading: $FILENAME"

              # Deletar asset antigo (nao notarizado)
              ASSET_ID=$(gh release view "$TAG" --json assets -q ".assets[] | select(.name==\"$FILENAME\") | .id" 2>/dev/null || true)
              if [ -n "$ASSET_ID" ]; then
                gh api -X DELETE "/repos/${{ github.repository }}/releases/assets/$ASSET_ID" 2>/dev/null || true
              fi

              # Upload do notarizado
              gh release upload "$TAG" "$DMG" --clobber 2>/dev/null || true
              echo "✅ $FILENAME uploaded"
            fi
          done

  # Build Mac Legacy (macOS 11 Big Sur) — Electron 28, sem notarizacao, .zip
  build-mac-legacy:
    needs: build-mac
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Convert icon
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            sips -s format png icon.ico --out icon.png --resampleWidth 1024 2>/dev/null || true
          fi

      - name: Install Electron 28 (macOS 11 compat)
        run: |
          npm install
          npm install electron@28 --save-dev --force

      - name: Build Mac Legacy (signed DMG, x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          npx electron-builder --mac dmg --x64 --publish never
          npx electron-builder --mac dmg --arm64 --publish never

      - name: Notarize legacy DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for DMG in dist/*.dmg; do
            if [ -f "$DMG" ]; then
              echo "=== Notarizando: $DMG ==="
              xcrun notarytool submit "$DMG" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait --timeout 30m 2>&1
              if [ $? -eq 0 ]; then
                echo "✅ Notarizado! Stapling..."
                xcrun stapler staple "$DMG"
              else
                echo "⚠️ Notarização falhou para $DMG"
              fi
            fi
          done

      - name: Upload legacy DMGs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "=== Upload legacy DMGs ==="

          for DMG in dist/*.dmg; do
            if [ -f "$DMG" ]; then
              BASENAME=$(basename "$DMG" .dmg)
              if echo "$BASENAME" | grep -q "arm64"; then
                NEWNAME="MultiPrime-V6-${TAG}-legacy-macOS11-AppleSilicon.dmg"
              else
                NEWNAME="MultiPrime-V6-${TAG}-legacy-macOS11-Intel.dmg"
              fi
              cp "$DMG" "dist/$NEWNAME"
              echo "Uploading: $NEWNAME"
              gh release upload "$TAG" "dist/$NEWNAME" --clobber 2>/dev/null || true
              echo "✅ $NEWNAME uploaded"
            fi
          done
