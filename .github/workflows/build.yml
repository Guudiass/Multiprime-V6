name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2-dev rpm dpkg fakeroot imagemagick

      - name: Convert icon for Linux
        if: matrix.platform == 'linux'
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            convert icon.ico[0] -resize 1024x1024 icon.png
            echo "icon.png gerado a partir do icon.ico"
          fi

      - name: Convert icon for Mac
        if: matrix.platform == 'mac'
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            sips -s format png icon.ico --out icon.png --resampleWidth 1024 2>/dev/null || true
            echo "icon.png gerado para Mac"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
