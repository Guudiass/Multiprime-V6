name: Test Mac Signing

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-mac:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Convert icon
        run: |
          if [ ! -f icon.png ] && [ -f icon.ico ]; then
            sips -s format png icon.ico --out icon.png --resampleWidth 1024 2>/dev/null || true
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Mac ARM64 only (sem publicar)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Buildar só ARM64 para ser mais rápido
          npx electron-builder --mac --arm64 --publish never
          echo "=== Arquivos gerados ==="
          ls -la dist/*.dmg dist/*.zip 2>/dev/null || true

      - name: Verificar assinatura
        run: |
          echo "=== Verificar code signing ==="
          codesign -dvvv dist/mac-arm64/MultiPrime\ V6.app 2>&1 || true
          echo ""
          echo "=== Verificar hardened runtime ==="
          codesign --display --entitlements - dist/mac-arm64/MultiPrime\ V6.app 2>&1 || true

      - name: Notarizar com timeout de 30 min
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls dist/*arm64*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "❌ Nenhum DMG encontrado!"
            exit 1
          fi

          echo "=== Submetendo $DMG ==="
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m 2>&1

          RESULT=$?
          echo ""
          echo "=== Exit code: $RESULT ==="

          if [ $RESULT -eq 0 ]; then
            echo "✅ Notarização concluída!"
            echo ""
            echo "=== Stapling ==="
            xcrun stapler staple "$DMG"
          else
            echo "❌ Notarização falhou ou timeout"
            echo ""
            echo "=== Verificando histórico ==="
            xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 | head -20
          fi

      - name: Upload para download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multiprime-mac-test
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 3
