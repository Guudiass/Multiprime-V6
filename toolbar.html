<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiPrime Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== TEMA: VARIAVEIS ===== */
  :root {
    --bg-primary: #f5f5f5;
    --bg-toolbar: rgba(245, 245, 245, 0.96);
    --bg-urlbar: rgba(228, 228, 228, 0.95);
    --bg-panel: #f0f0f0;
    --bg-btn-hover: rgba(0, 0, 0, 0.08);
    --bg-btn: rgba(0, 0, 0, 0.04);
    --border-subtle: rgba(0, 0, 0, 0.08);
    --border-focus: rgba(59, 130, 246, 0.5);
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --text-url: #333;
    --text-placeholder: rgba(0, 0, 0, 0.35);
    --close-hover: #e74c3c;
    --toast-bg: rgba(245, 245, 245, 0.97);
    --toast-border: rgba(0, 0, 0, 0.1);
    --toast-shadow: rgba(0, 0, 0, 0.12);
    --dl-action: #2563eb;
    --dl-action-hover: #1d4ed8;
    --dl-clear-hover-bg: rgba(231, 76, 60, 0.1);
    --spinner-track: rgba(0, 0, 0, 0.1);
  }

  :root.dark {
      --bg-primary: #181818;
      --bg-toolbar: rgba(24, 24, 24, 0.96);
      --bg-urlbar: rgba(32, 32, 32, 0.95);
      --bg-panel: #1a1a1a;
      --bg-btn-hover: rgba(255, 255, 255, 0.1);
      --bg-btn: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(100, 149, 237, 0.5);
      --text-primary: #ecf0f1;
      --text-secondary: #ccc;
      --text-tertiary: #888;
      --text-url: #e8e8e8;
      --text-placeholder: rgba(255, 255, 255, 0.3);
      --close-hover: #e74c3c;
      --toast-bg: rgba(32, 32, 32, 0.97);
      --toast-border: rgba(255, 255, 255, 0.08);
      --toast-shadow: rgba(0, 0, 0, 0.4);
      --dl-action: #60a5fa;
      --dl-action-hover: #93bbfc;
      --dl-clear-hover-bg: rgba(231, 76, 60, 0.1);
      --spinner-track: rgba(255, 255, 255, 0.15);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    user-select: none;
    color: var(--text-primary);
  }

  /* ===== TOOLBAR ===== */
  .toolbar {
    width: 100%;
    height: 44px;
    background: var(--bg-toolbar);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    border-bottom: 1px solid var(--border-subtle);
    -webkit-app-region: drag;
    position: relative;
  }

  .toolbar * { -webkit-app-region: no-drag; }

  /* ===== BARRA DE CARREGAMENTO ===== */
  .loading-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
    background-size: 200% 100%;
    border-radius: 0 1px 1px 0;
    width: 0%;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .loading-bar.active {
    opacity: 1;
    animation: loading-progress 12s cubic-bezier(0.25, 0.8, 0.25, 0.95) forwards,
               loading-shimmer 1.5s linear infinite;
  }

  .loading-bar.done {
    width: 100% !important;
    animation: none;
    transition: width 0.2s ease-out, opacity 0.4s ease 0.3s;
    opacity: 0;
  }

  @keyframes loading-progress {
    0%   { width: 0%; }
    10%  { width: 25%; }
    30%  { width: 45%; }
    50%  { width: 60%; }
    70%  { width: 72%; }
    90%  { width: 85%; }
    100% { width: 92%; }
  }

  @keyframes loading-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ===== NAVEGACAO ===== */
  .nav-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    background: var(--bg-btn);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    display: grid;
    place-items: center;
    transition: all 0.15s ease;
    padding: 0;
    line-height: 1;
  }

  .nav-btn:hover {
    background: var(--bg-btn-hover);
    border-color: var(--border-subtle);
    color: var(--text-primary);
  }

  .nav-btn:active { transform: scale(0.94); }

  /* ===== URL BAR ===== */
  .url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 32px;
    padding: 0 12px;
    background: var(--bg-urlbar);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .url-bar:focus-within { border-color: var(--border-focus); }

  .url-leading {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .favicon {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    display: none;
  }

  .favicon.visible { display: block; }

  .lock-icon { font-size: 11px; opacity: 0.8; }

  /* Spinner de carregamento dentro da URL bar */
  .loading-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--spinner-track);
    border-top-color: #3b82f6;
    border-radius: 50%;
    display: none;
    flex-shrink: 0;
  }

  .loading-spinner.active {
    display: block;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .url-input {
    flex: 1;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--text-url);
    font-size: 13px;
    outline: none;
    min-width: 0;
    text-overflow: ellipsis;
  }

  .url-input::placeholder { color: var(--text-placeholder); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00d084;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.offline { background: #e74c3c; }

  /* ===== ACOES ===== */
  .actions-group {
    display: flex;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  /* action-btn removido — window controls agora na tab bar */

  /* ===== BOTAO DOWNLOADS ===== */
  .downloads-btn {
    height: 28px;
    width: auto;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-btn);
    color: var(--text-tertiary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
  }

  .downloads-btn:hover {
    background: var(--bg-btn-hover);
    color: var(--text-primary);
    border-color: var(--border-subtle);
  }

  .downloads-badge {
    display: none;
    background: #3b82f6;
    color: #fff;
    font-size: 10px;
    min-width: 16px;
    height: 16px;
    border-radius: 50%;
    text-align: center;
    line-height: 16px;
    font-weight: 600;
  }

  .downloads-badge.active { display: inline-block; }
  .downloads-badge.has-active { background: #3b82f6; animation: badge-pulse 2s infinite; }
  .downloads-badge.all-done { background: #22c55e; animation: none; }

  @keyframes badge-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ===== PAINEL DE DOWNLOADS ===== */
  .downloads-panel {
    position: fixed;
    top: 44px;
    right: 0;
    width: 370px;
    bottom: 0;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-subtle);
    z-index: 1000;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }

  .downloads-panel.open { display: flex; }

  .dl-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }

  .dl-panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .dl-panel-count {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-btn);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .dl-clear-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .dl-clear-btn:hover { color: #e74c3c; background: var(--dl-clear-hover-bg); }

  .dl-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px;
  }

  .dl-empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-secondary);
    font-size: 13px;
  }

  .dl-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

  /* ===== ITEM DE DOWNLOAD ===== */
  .dl-item {
    padding: 10px 10px;
    border-radius: 8px;
    margin-bottom: 2px;
    transition: background 0.15s;
  }

  .dl-item:hover { background: var(--bg-btn); }

  .dl-item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .dl-item-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .dl-item-icon.downloading { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
  .dl-item-icon.completed { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
  .dl-item-icon.failed { background: rgba(239, 68, 68, 0.15); color: #f87171; }

  .dl-item-info { flex: 1; min-width: 0; }

  .dl-item-name {
    font-size: 12.5px;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dl-item-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 1px;
  }

  .dl-item-progress {
    height: 3px;
    background: var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }

  .dl-item-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
    background: #3b82f6;
  }

  .dl-item-progress-fill.complete { background: #22c55e; }

  .dl-item-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .dl-action-link {
    font-size: 11.5px;
    color: var(--dl-action);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s;
  }

  .dl-action-link:hover { color: var(--dl-action-hover); text-decoration: underline; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: -60px;
    right: 20px;
    background: var(--toast-bg);
    color: var(--text-primary);
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--toast-border);
    box-shadow: 0 8px 24px var(--toast-shadow);
    font-size: 12px;
    transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9999;
    max-width: 320px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.visible { bottom: 20px; }
  .toast-icon { font-size: 14px; }

  /* ===== TAB BAR ===== */
  .tab-bar {
    width: 100%;
    height: 36px;
    background: var(--bg-toolbar);
    display: flex;
    align-items: center;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border-subtle);
  }

  .tab-bar-tabs {
    flex: 1;
    display: flex;
    align-items: flex-end;
    height: 100%;
    padding: 0 8px;
    gap: 2px;
    overflow: hidden;
    min-width: 0;
  }

  .window-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 6px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  .win-btn {
    width: 32px;
    height: 28px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-tertiary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .win-btn:hover { background: var(--bg-btn-hover); color: var(--text-primary); }
  .win-close:hover { background: #e81123; color: #fff; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 30px;
    flex: 1 1 0;
    min-width: 0;
    max-width: 220px;
    padding: 0 8px 0 10px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-app-region: no-drag;
  }

  .tab:hover {
    background: var(--bg-btn-hover);
  }

  .tab.active {
    background: var(--bg-primary);
    border-color: var(--border-subtle);
  }

  .tab-favicon {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .tab-title {
    flex: 1;
    font-size: 11.5px;
    color: var(--text-tertiary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .tab.active .tab-title {
    color: var(--text-primary);
  }

  .tab-close {
    width: 18px;
    height: 18px;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transition: all 0.1s;
    padding: 0;
    line-height: 1;
  }

  .tab:hover .tab-close,
  .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--close-hover); color: #fff; }

  /* Loading spinner na aba (substitui favicon durante carregamento) */
  .tab-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border-subtle);
    border-top-color: #3b82f6;
    border-radius: 50%;
    flex-shrink: 0;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .tab.loading .tab-spinner { display: block; }
  .tab.loading .tab-favicon { display: none; }
</style>
</head>
<body>

<!-- Tab Bar + Window Controls -->
<div class="tab-bar" id="tab-bar">
  <div class="tab-bar-tabs" id="tab-bar-tabs"></div>
  <div class="window-controls">
    <button class="win-btn" id="btn-minimize" title="Minimizar">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="win-btn" id="btn-maximize" title="Maximizar">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
    <button class="win-btn win-close" id="btn-close" title="Fechar">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="toolbar">
  <!-- Barra de carregamento -->
  <div class="loading-bar" id="loading-bar"></div>

  <!-- Navegacao -->
  <div class="nav-group">
    <button class="nav-btn" id="btn-back" title="Voltar">&#8592;</button>
    <button class="nav-btn" id="btn-forward" title="Avançar">&#8594;</button>
    <button class="nav-btn" id="btn-reload" title="Recarregar">&#8635;</button>
  </div>

  <!-- URL Bar -->
  <div class="url-bar">
    <div class="url-leading">
      <div class="loading-spinner" id="loading-spinner"></div>
      <img class="favicon" id="favicon" alt="">
      <span class="lock-icon" id="lock-icon">&#128274;</span>
    </div>
    <input type="text" class="url-input" id="url-input" readonly placeholder="Carregando...">
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- Downloads -->
  <div class="actions-group">
    <button class="downloads-btn" id="btn-downloads">
      &#8595; Downloads
      <span class="downloads-badge" id="downloads-badge">0</span>
    </button>
  </div>
</div>

<!-- Painel de Downloads -->
<div class="downloads-panel" id="downloads-panel">
  <div class="dl-panel-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="dl-panel-title">Downloads</span>
      <span class="dl-panel-count" id="dl-count">0 arquivos</span>
    </div>
    <button class="dl-clear-btn" id="dl-clear" title="Limpar historico">Limpar</button>
  </div>
  <div class="dl-list" id="dl-list">
    <div class="dl-empty" id="dl-empty">
      <div class="dl-empty-icon">&#8595;</div>
      Nenhum download nesta sessao
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon"></span>
  <span id="toast-text"></span>
</div>

<script>
  const api = window.toolbarAPI;
  const downloads = new Map();

  // ===== TEMA =====
  api.onThemeChanged((tema) => {
    document.documentElement.classList.toggle('dark', tema === 'dark');
  });

  // ===== ABAS =====
  const tabBar = document.getElementById('tab-bar-tabs');
  let activeTabIdLocal = null;

  function createTabElement(data) {
    const tab = document.createElement('div');
    tab.className = 'tab loading' + (data.isActive ? ' active' : '');
    tab.setAttribute('data-tab-id', data.tabId);

    const spinner = document.createElement('div');
    spinner.className = 'tab-spinner';

    const fav = document.createElement('img');
    fav.className = 'tab-favicon';
    fav.src = data.favicon || '';
    fav.onerror = function() { this.style.display = 'none'; };
    if (!data.favicon) fav.style.display = 'none';

    const title = document.createElement('span');
    title.className = 'tab-title';
    title.textContent = data.title || 'Carregando...';

    const close = document.createElement('button');
    close.className = 'tab-close';
    close.innerHTML = '&#215;';
    close.addEventListener('click', function(e) {
      e.stopPropagation();
      api.closeTab(data.tabId);
    });

    tab.appendChild(spinner);
    tab.appendChild(fav);
    tab.appendChild(title);
    tab.appendChild(close);

    tab.addEventListener('click', function() {
      api.switchTab(data.tabId);
    });

    return tab;
  }

  api.onTabAdded(function(data) {
    tabBar.appendChild(createTabElement(data));
    if (data.isActive) setActiveTabLocal(data.tabId);
  });

  api.onTabRemoved(function(tabId) {
    const el = tabBar.querySelector('[data-tab-id="' + tabId + '"]');
    if (el) el.remove();
  });

  api.onTabActivated(function(data) {
    setActiveTabLocal(data.tabId);
  });

  api.onTabUpdated(function(data) {
    const el = tabBar.querySelector('[data-tab-id="' + data.tabId + '"]');
    if (!el) return;
    if (data.title) {
      el.querySelector('.tab-title').textContent = data.title;
    }
    if (data.favicon) {
      var fav = el.querySelector('.tab-favicon');
      fav.src = data.favicon;
      fav.style.display = '';
      fav.onerror = function() { this.style.display = 'none'; };
    }
  });

  api.onTabLoading(function(data) {
    const el = tabBar.querySelector('[data-tab-id="' + data.tabId + '"]');
    if (el) el.classList.toggle('loading', data.isLoading);
  });

  function setActiveTabLocal(tabId) {
    activeTabIdLocal = tabId;
    var allTabs = tabBar.querySelectorAll('.tab');
    for (var i = 0; i < allTabs.length; i++) {
      allTabs[i].classList.toggle('active', allTabs[i].getAttribute('data-tab-id') === tabId);
    }
  }

  // ===== ELEMENTOS =====
  const urlInput       = document.getElementById('url-input');
  const lockIcon       = document.getElementById('lock-icon');
  const favicon        = document.getElementById('favicon');
  const statusDot      = document.getElementById('status-dot');
  const loadingBar     = document.getElementById('loading-bar');
  const loadingSpinner = document.getElementById('loading-spinner');
  const dlPanel        = document.getElementById('downloads-panel');
  const dlList         = document.getElementById('dl-list');
  const dlEmpty        = document.getElementById('dl-empty');
  const dlBadge        = document.getElementById('downloads-badge');
  const dlCount        = document.getElementById('dl-count');
  const toast          = document.getElementById('toast');
  const toastIcon      = document.getElementById('toast-icon');
  const toastText      = document.getElementById('toast-text');

  // ===== NAVEGACAO =====
  document.getElementById('btn-back').addEventListener('click', () => api.navigateBack());
  document.getElementById('btn-forward').addEventListener('click', () => api.navigateForward());
  document.getElementById('btn-reload').addEventListener('click', () => api.navigateReload());
  document.getElementById('btn-minimize').addEventListener('click', () => api.minimize());
  document.getElementById('btn-maximize').addEventListener('click', () => api.maximize());
  document.getElementById('btn-close').addEventListener('click', () => api.close());

  // ===== BARRA DE CARREGAMENTO =====
  let loadingTimeout = null;
  let isPageLoading = false;

  api.onPageLoading((isLoading) => {
    if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }

    isPageLoading = isLoading;

    if (isLoading) {
      loadingBar.classList.remove('done');
      void loadingBar.offsetWidth; // Force reflow para reiniciar animacao
      loadingBar.classList.add('active');
      loadingSpinner.classList.add('active');
      // Esconder favicon, mostrar spinner
      favicon.classList.remove('visible');
    } else {
      loadingBar.classList.remove('active');
      loadingBar.classList.add('done');
      loadingSpinner.classList.remove('active');
      // Mostrar favicon
      if (favicon.getAttribute('src')) favicon.classList.add('visible');

      loadingTimeout = setTimeout(() => {
        loadingBar.classList.remove('done');
      }, 700);
    }
  });

  // ===== URL ATUALIZADA =====
  api.onUrlUpdated((url) => {
    urlInput.value = url || '';
    try {
      const u = new URL(url);
      lockIcon.innerHTML = u.protocol === 'https:' ? '&#128274;' : '&#9888;';
      favicon.src = u.origin + '/favicon.ico';
      favicon.onerror = () => { favicon.removeAttribute('src'); favicon.classList.remove('visible'); };
      if (!isPageLoading) favicon.classList.add('visible');
    } catch {
      lockIcon.innerHTML = '&#9888;';
      favicon.removeAttribute('src');
      favicon.classList.remove('visible');
    }
  });

  // ===== STATUS ONLINE/OFFLINE =====
  function updateStatus() { statusDot.classList.toggle('offline', !navigator.onLine); }
  updateStatus();
  window.addEventListener('online', updateStatus);
  window.addEventListener('offline', updateStatus);

  // ===== DOWNLOADS PANEL TOGGLE =====
  let panelOpen = false;

  function setDownloadsPanel(open) {
    panelOpen = open;
    if (open) {
      dlPanel.classList.add('open');
    } else {
      dlPanel.classList.remove('open');
    }
    // Avisar o main process para encolher/restaurar a BrowserView
    api.toggleDownloadsPanel(open);
  }

  document.getElementById('btn-downloads').addEventListener('click', (e) => {
    e.stopPropagation();
    setDownloadsPanel(!panelOpen);
  });

  document.addEventListener('click', (e) => {
    if (panelOpen && !e.target.closest('.downloads-panel') && !e.target.closest('#btn-downloads')) {
      setDownloadsPanel(false);
    }
  });

  // Limpar historico (so finalizados)
  document.getElementById('dl-clear').addEventListener('click', () => {
    const toRemove = [];
    downloads.forEach((dl, id) => {
      if (dl.state !== 'active') toRemove.push(id);
    });
    toRemove.forEach(id => downloads.delete(id));
    renderDownloads();
  });

  // ===== TOAST =====
  let toastTimeout = null;
  function showToast(icon, text) {
    if (toastTimeout) clearTimeout(toastTimeout);
    toastIcon.textContent = icon;
    toastText.textContent = text;
    toast.classList.add('visible');
    toastTimeout = setTimeout(() => toast.classList.remove('visible'), 3500);
  }

  // ===== FORMATAR HORA =====
  function formatTime(date) {
    return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // ===== RENDERIZAR DOWNLOADS =====
  function renderDownloads() {
    dlList.querySelectorAll('.dl-item').forEach(el => el.remove());

    const total = downloads.size;
    let activeCount = 0;

    if (total === 0) {
      dlEmpty.style.display = 'block';
      dlBadge.className = 'downloads-badge';
      dlCount.textContent = '0 arquivos';
      return;
    }

    dlEmpty.style.display = 'none';
    dlCount.textContent = total + ' arquivo' + (total > 1 ? 's' : '');

    // Mais recente primeiro
    var entries = Array.from(downloads.entries()).reverse();

    for (var i = 0; i < entries.length; i++) {
      var id = entries[i][0];
      var dl = entries[i][1];

      if (dl.state === 'active') activeCount++;

      var item = document.createElement('div');
      item.className = 'dl-item';
      item.setAttribute('data-id', id);

      var iconClass, iconSymbol;
      if (dl.state === 'active') { iconClass = 'downloading'; iconSymbol = '\u2193'; }
      else if (dl.state === 'completed') { iconClass = 'completed'; iconSymbol = '\u2713'; }
      else { iconClass = 'failed'; iconSymbol = '\u2715'; }

      var statusText;
      if (dl.state === 'active') statusText = dl.progress + '% \u00B7 Baixando...';
      else if (dl.state === 'completed') statusText = 'Concluido as ' + formatTime(dl.completedAt || dl.startedAt);
      else if (dl.state === 'cancelled') statusText = 'Cancelado';
      else statusText = 'Falha no download';

      var html = '<div class="dl-item-header">' +
        '<div class="dl-item-icon ' + iconClass + '">' + iconSymbol + '</div>' +
        '<div class="dl-item-info">' +
        '<div class="dl-item-name" title="' + dl.filename + '">' + dl.filename + '</div>' +
        '<div class="dl-item-meta">' + statusText + '</div>' +
        '</div></div>';

      if (dl.state === 'active' || dl.state === 'completed') {
        html += '<div class="dl-item-progress">' +
          '<div class="dl-item-progress-fill ' + (dl.state === 'completed' ? 'complete' : '') +
          '" style="width: ' + dl.progress + '%"></div></div>';
      }

      item.innerHTML = html;

      if (dl.state === 'completed' && dl.path) {
        var actions = document.createElement('div');
        actions.className = 'dl-item-actions';

        var openLink = document.createElement('a');
        openLink.className = 'dl-action-link';
        openLink.textContent = 'Abrir arquivo';
        openLink.setAttribute('data-path', dl.path);
        openLink.addEventListener('click', function() {
          api.openDownload(this.getAttribute('data-path'));
        });

        var folderLink = document.createElement('a');
        folderLink.className = 'dl-action-link';
        folderLink.textContent = 'Mostrar na pasta';
        folderLink.setAttribute('data-path', dl.path);
        folderLink.addEventListener('click', function() {
          api.showInFolder(this.getAttribute('data-path'));
        });

        actions.appendChild(openLink);
        actions.appendChild(folderLink);
        item.appendChild(actions);
      }

      dlList.appendChild(item);
    }

    // Badge
    if (activeCount > 0) {
      dlBadge.textContent = activeCount;
      dlBadge.className = 'downloads-badge active has-active';
    } else {
      dlBadge.textContent = total;
      dlBadge.className = 'downloads-badge active all-done';
    }
  }

  // ===== EVENTOS DE DOWNLOAD =====
  api.onDownloadStarted(function(data) {
    downloads.set(data.id, {
      filename: data.filename,
      progress: 0,
      state: 'active',
      path: null,
      startedAt: new Date(),
      completedAt: null
    });
    renderDownloads();
    showToast('\u2193', 'Baixando: ' + data.filename);
  });

  api.onDownloadProgress(function(data) {
    var dl = downloads.get(data.id);
    if (dl && dl.state === 'active') {
      dl.progress = data.progress;
      // Atualizar so o item especifico para performance
      var item = dlList.querySelector('[data-id="' + data.id + '"]');
      if (item) {
        var fill = item.querySelector('.dl-item-progress-fill');
        var meta = item.querySelector('.dl-item-meta');
        if (fill) fill.style.width = data.progress + '%';
        if (meta) meta.textContent = data.progress + '% \u00B7 Baixando...';
      }
    }
  });

  api.onDownloadComplete(function(data) {
    var dl = downloads.get(data.id);
    if (dl) {
      dl.state = data.state;
      dl.path = data.path;
      dl.progress = data.state === 'completed' ? 100 : (data.progress || dl.progress);
      dl.completedAt = new Date();
      renderDownloads();

      if (data.state === 'completed') {
        showToast('\u2713', 'Concluido: ' + dl.filename);
      } else {
        showToast('\u2715', 'Falha: ' + dl.filename);
      }
    }
  });

  // Solicitar URL inicial
  api.requestInitialUrl();
</script>

</body>
</html>
